name: Playwright Matrix CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # ✅ Cache Playwright browsers (better key)
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v1
          restore-keys: |
            playwright-${{ runner.os }}

      # ✅ Install Playwright browsers
      - name: Install Playwright Browsers
        run: mvn exec:java \
          -Dexec.mainClass=com.microsoft.playwright.CLI \
          -Dexec.args="install chromium firefox webkit"

      # ✅ Run tests
      - name: Run Tests
        run: |
          mvn clean test \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -DretryCount=1

      # ✅ Upload Allure results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results

  report:
    needs: test
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Download artifacts
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      # ✅ Merge results properly
      - name: Merge Allure Results
        run: |
          mkdir -p target/allure-results
          find allure-results -type d -name "allure-results" \
          -exec cp -r {}/* target/allure-results \; || true

      # ✅ Generate report
      - name: Generate Allure Report
        run: mvn allure:report

      # ✅ Deploy report
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/site/allure-maven-plugin
          force_orphan: true